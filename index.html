<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menos de Nós, Mais de Deus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-user-select: none;
            user-select: none;
            transition: background-color 0.3s, color 0.3s;
        }
        .serif { font-family: 'Playfair Display', Georgia, serif; }
        .bg-gold-gradient { background: linear-gradient(135deg, #8B7355 0%, #A68D6D 100%); }
        .text-gold { color: #8B7355; }
        
        button, .nav-btn { 
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Estilização para textos teológicos longos e confortáveis */
        .prose-devotional p {
            margin-bottom: 1.25rem;
            line-height: 1.8;
            text-align: justify;
            text-indent: 1.5rem;
        }
    </style>
</head>
<body class="min-h-screen bg-[#fcfbfa] text-[#3e3327] dark:bg-[#121110] dark:text-[#f3f1ed] flex flex-col max-w-md mx-auto shadow-2xl relative pb-24">

    <header class="bg-white dark:bg-[#1c1a18] border-b border-neutral-100 dark:border-neutral-800/60 px-6 py-4 flex justify-between items-center sticky top-0 z-40 shadow-sm transition-colors">
        <div>
            <span id="txt-data-topo" class="text-[10px] font-bold text-amber-800 dark:text-amber-500 tracking-widest uppercase">Carregando...</span>
            <h1 class="serif text-xl font-bold text-neutral-900 dark:text-neutral-100 tracking-tight">Menos de Nós</h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleDarkMode()" class="w-8 h-8 rounded-full flex items-center justify-center bg-neutral-50 dark:bg-neutral-800 border border-neutral-200/40 dark:border-neutral-700 text-neutral-600 dark:text-neutral-300 active:scale-95 transition-all">
                <span id="icon-dark-mode" class="material-icons-round text-lg">dark_mode</span>
            </button>
            <div class="flex items-center gap-1 bg-amber-50/60 dark:bg-amber-950/40 px-3 py-1.5 rounded-full border border-amber-100/50 dark:border-amber-900/40">
                <span class="material-icons-round text-sm text-amber-800 dark:text-amber-500">spa</span>
                <span class="text-xs font-bold text-neutral-700 dark:text-neutral-300">M & I</span>
            </div>
        </div>
    </header>

    <div id="toast" class="hidden fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-neutral-900/95 dark:bg-neutral-100/95 text-white dark:text-neutral-900 text-xs px-5 py-3 rounded-xl shadow-xl z-50 transition-all duration-300 max-w-xs text-center font-medium"></div>

    <main class="flex-1 p-5 overflow-y-auto no-scrollbar">

        <section id="view-inicio" class="space-y-4 block">
            <div class="bg-gradient-to-r from-amber-50 to-orange-50/30 dark:from-amber-950/20 dark:to-transparent rounded-2xl p-5 border border-amber-100/40 dark:border-amber-900/30 space-y-1">
                <h2 class="serif text-lg font-bold text-neutral-900 dark:text-neutral-100">Bem-vindos ao vosso Altar</h2>
                <p class="text-xs text-neutral-500 dark:text-neutral-400 leading-relaxed">Edificando o casamento sobre o fundamento eterno da Palavra divina.</p>
            </div>

            <div id="wrapper-devocional-ativo" class="space-y-4">
                <div class="text-center py-10 text-xs text-neutral-400 animate-pulse">Sincronizando santuário familiar no Firebase...</div>
            </div>
        </section>

        <section id="view-leitura" class="hidden space-y-4">
            <div class="mb-2 flex justify-between items-end">
                <div>
                    <h2 class="serif text-xl font-bold text-neutral-900 dark:text-neutral-100">Leitura Bíblica</h2>
                    <p class="text-xs text-neutral-500 dark:text-neutral-400">Alimentação espiritual através do plano cronológico.</p>
                </div>
                <div id="csv-status-badge" class="text-[10px] bg-neutral-100 dark:bg-neutral-800 text-neutral-400 px-2 py-0.5 rounded font-mono">Processando CSV...</div>
            </div>
            
            <div class="bg-white dark:bg-[#1c1a18] border border-neutral-100 dark:border-neutral-800/50 rounded-3xl p-6
