<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eterno Compromisso</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfbfa; color: #3e3327; }
        .serif { font-family: 'Georgia', serif; }
        .bg-gold-gradient { background: linear-gradient(135deg, #8B7355 0%, #A68D6D 100%); }
        .text-gold { color: #8B7355; }
        .border-gold { border-color: #A68D6D; }
    </style>
</head>
<body class="min-h-screen flex flex-col max-w-md mx-auto shadow-2xl bg-white relative pb-20">

    <header class="bg-gold-gradient text-white p-5 pt-7 text-center rounded-b-3xl shadow-md">
        <h1 class="serif text-2xl font-bold tracking-wide">Eterno Compromisso</h1>
        <p class="text-xs opacity-90 mt-1 uppercase tracking-widest">Marcus & Ingrid</p>
    </header>

    <div id="toast" class="hidden fixed top-5 left-1/2 transform -translate-x-1/2 bg-neutral-900 text-white text-sm px-4 py-3 rounded-xl shadow-lg z-50 transition-all duration-300"></div>

    <main class="flex-1 p-5 overflow-y-auto">
        
        <section id="view-inicio" class="space-y-6">
            <div class="bg-amber-50/50 border border-amber-100 rounded-2xl p-5 text-center">
                <h2 class="serif text-xl font-bold mb-1">Bem-vindos, amados!</h2>
                <p class="text-xs text-neutral-500">"O cordão de três dobras não se quebra facilmente."</p>
            </div>

            <div class="border border-neutral-100 rounded-2xl p-6 shadow-sm bg-white space-y-4">
                <div class="flex items-center gap-2 text-gold">
                    <span class="material-icons-round">auto_stories</span>
                    <span class="text-xs font-bold uppercase tracking-wider">Devocional Ativo de Hoje</span>
                </div>
                <div id="devocional-container" class="space-y-4">
                    <p class="text-sm text-neutral-400 text-center py-4">Nenhum devocional gerado para hoje. Vá na aba "Gerar IA" para iniciar!</p>
                </div>
            </div>
        </section>

        <section id="view-biblia" class="hidden space-y-4">
            <div class="mb-2">
                <h2 class="serif text-xl font-bold">Plano de Leitura Anual</h2>
                <p class="text-xs text-neutral-500">Sincronizado em tempo real entre o casal</p>
            </div>
            <div id="lista-leitura" class="space-y-3"></div>
        </section>

        <section id="view-gerar" class="hidden space-y-6
